<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
  <div style="display: flex; justify-content: space-between; padding: 0px 40px; gap:2px; height: 100%;">
    <div id="notes_show_container" style="width: 50%;">

    </div>
    <div id="notes_create_container" style="border: 1px solid black; padding: 5px; border-radius: 10px; width: 20%; display: flex; flex-direction: column; gap:5px; height: 40%;">
    
        <input type="text" placeholder="enter the title of the notes" id="note_title">
        <textarea placeholder="enter the discription of the notes" id="note_discription"></textarea>
        <button style="font-weight: bold;" onclick="createAndShowNote()">Create Note</button>
     
    </div>
  </div>
  <script>
   async function createNote(){
    let note_title=document.getElementById('note_title').value;
    let note_discription=document.getElementById('note_discription').value;

    await fetch('http://localhost:3000/notes', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            note_title,
            note_discription
        })
    });

    document.getElementById('note_title').value = "";
    document.getElementById('note_discription').value = "";
   }

   async function showNotes(){
    const response = await fetch('http://localhost:3000/notes');
    const notes = await response.json();

    const container = document.getElementById('notes_show_container');
    container.innerHTML = '';

    notes.forEach((data) => {
        let note = document.createElement('div');
        note.style.margin = '8px 0';
        note.style.border='1px solid black'
        note.style.padding='4px'
        note.innerHTML = `<strong>${data.note_title}</strong><br>${data.note_discription}`;
        container.appendChild(note);
    });
   }
showNotes();
   async function createAndShowNote(){
    await createNote();
    await showNotes();
   }
 </script>
</body>
</html>
